<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="/styles.css" rel="stylesheet">
</head>
<body class="contact-page">
    <div id="page-transition">
  <h1 id="page-title"></h1>
</div>
    <div class="header-wrapper">
    <header>
     
        <div class="logo">
            <a href="/index.html">
            <img src="/logos/Seabank_Primary_Orange_RGB.png">
            </a>
        </div>
        <div class="hamburger">
            <div class="lines"></div>
            <div class="lines"></div>
            <div class="lines"></div>
        </div>
        <nav class="navbar">
            <ul>
                
                <li><a href="/html/about.html" class="active">About</a></li>
                <li><a href="/html/services.html">Services</a></li>
                <li><a href="/html/contact.html">Contact</a></li>
                <li><a href="/html/donate.html">Donate</a></li>
            </ul>
        </nav>
 
    </header> 
</div>

<section class="contact">
  <div class="container">

    <div class="contact-grid">

      <!-- Contact Info -->
      <div class="contact-info">
        <h2>Contact Us</h2>
        <p>We’re here to help. Get in touch with Seabank House to learn more about our care services or to arrange a visit.</p>

        <div class="info-item">
          <strong>Address:</strong>
          <p>Seabank House, Aberdeen, Scotland</p>
        </div>

        <div class="info-item">
          <strong>Phone:</strong>
          <p>01224 000000</p>
        </div>

        <div class="info-item">
          <strong>Email:</strong>
          <p>info@seabankhouse.co.uk</p>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="contact-form">
        <form>
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <input type="tel" placeholder="Your Phone">
          <textarea placeholder="Your Message" rows="5" required></textarea>
          <button type="submit">Send Enquiry</button>
        </form>
      </div>

    </div>

  </div>
</section>


<script src="/script.js"></script>
</body>
</html>
